# x402 Fast PDF Parser — edge seller.
# Top-level config = the TESTNET Worker (x402-parser-edge).
# [env.mainnet] = the separate Base mainnet Worker (x402-parser-edge-mainnet);
# deploy it with: wrangler deploy --env mainnet
name = "x402-parser-edge"
main = "src/index.ts"
compatibility_date = "2026-05-01"
# nodejs_compat: @x402/hono uses Buffer when capturing the response for settlement.
compatibility_flags = ["nodejs_compat"]

# Parsing needs real CPU time; the default 30s ceiling is plenty, but pin a
# 5s cap to match the parse jail. Requires the Workers Paid plan.
[limits]
cpu_ms = 5000

[vars]
# Receiving wallet ADDRESS only — no private keys anywhere in the seller.
PAYMENT_ADDRESS = "0xa7737300F4A0dDB4aF3fA6e2D886D0dE37e01e08"
# Public x402 facilitator (supports Base Sepolia testnet, no API key needed).
FACILITATOR_URL = "https://www.x402.org/facilitator"

# Replay protection + per-wallet rate limiting.
# Create with: wrangler kv namespace create PARSER_KV
[[kv_namespaces]]
binding = "PARSER_KV"
id = "fb6b096bfa8243e1809345606bf55188"

# Per-IP throttle for unpaid request floods — checked before any other work
# on POST /parse. namespace_id is an account-unique integer per environment.
[[ratelimits]]
name = "IP_RATE_LIMIT"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# --- Base mainnet (REAL USDC) — separate Worker, own KV, CDP facilitator ---
# Requires secrets (never committed):
#   wrangler secret put CDP_API_KEY_ID --env mainnet
#   wrangler secret put CDP_API_KEY_SECRET --env mainnet
[env.mainnet]
name = "x402-parser-edge-mainnet"

[env.mainnet.limits]
cpu_ms = 5000

[env.mainnet.vars]
PAYMENT_ADDRESS = "0xa7737300F4A0dDB4aF3fA6e2D886D0dE37e01e08"
NETWORK = "eip155:8453"
# No FACILITATOR_URL: mainnet always uses the CDP facilitator via secrets.

[[env.mainnet.kv_namespaces]]
binding = "PARSER_KV"
id = "e2e08cbfb78a441e8c3e3eb8030b5706"

[[env.mainnet.ratelimits]]
name = "IP_RATE_LIMIT"
namespace_id = "2001"
simple = { limit = 100, period = 60 }
